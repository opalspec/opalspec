description = "Start a new OpalSpec spec — gather name + description, then pick generate-or-askme"
prompt = """
First read .opal/runtime/spec-authoring-instructions.md, .opal/runtime/new-instructions.md, and .opal/runtime/askme-instructions.md, and follow them for this request.

Inputs: <feature-name> and <description> are both optional. Resolve them per new-instructions.md — infer the kebab-case name from the description if missing, and ask for the description if it is missing. Confirm the name with the user before creating any files.

Then ask: 'Would you like me to generate a draft requirements doc, or ask you questions to clarify direction first?'

Branch on the answer:
- Generate / draft → write .opal/specs/<feature-name>/requirements.md in one pass following spec-authoring-instructions.md.
- Ask questions / askme → follow askme-instructions.md to interview the user one question at a time, writing requirements.md inline.

When the requirements doc is settled, suggest /opal:design.

Do not skip the style question. Do not write before the name is confirmed. Do not create design.md or tasks.md. Do not implement code.
"""

