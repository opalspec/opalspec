description = "Build an OpalSpec spec task plan"
prompt = """
First read .opal/runtime/spec-authoring-instructions.md and .opal/runtime/change-protocol.md, and follow them for this request.

The spec name argument is optional; if omitted, follow the spec inference rule in .opal/runtime/spec-authoring-instructions.md.

Read .opal/specs/<change-name>/requirements.md and design.md. Check for tasks.md:
- Present: treat tasks.md as the persistent resume ledger. Implement pending tasks in order, and update each completed task, subtask, or checkpoint checkbox in tasks.md immediately after it completes. Do not wait until the end or rely only on chat-plan state.
- Absent: work directly from design.md; plan a short ordered checklist and implement in dependency order.

Run relevant verification commands at checkpoint tasks and at the end. Report anything that cannot be run.

After build, ask the user: 'Want me to write or update a dev doc for this with /opal:document <topic>?'. If yes, run the document flow per .opal/runtime/document-instructions.md.

If building reveals a design or requirement problem, stop and run the change protocol: report the discovery, propose spec edits, wait for user acceptance, update the affected docs (requirements → design → tasks if present) preserving traceability, then resume. Do not edit specs unilaterally.
"""
