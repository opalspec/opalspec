name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20.19.0', '22.x']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Release consistency check
        run: node scripts/check-release-consistency.mjs

      - name: Pack tarball (dry run)
        run: npm pack --dry-run

  smoke-install:
    name: Smoke install (ubuntu-latest, Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Build tarball
        run: npm pack

      - name: Install tarball globally
        run: |
          TARBALL=$(ls opalspec-opalspec-*.tgz)
          npm install -g "./$TARBALL"

      - name: Init OpalSpec into a fresh repo
        run: |
          set -euo pipefail
          REPO=$(mktemp -d)
          cd "$REPO"
          git init -q
          git config user.email ci@example.com
          git config user.name "CI"
          opalspec init --tools codex,claude --yes
          opalspec doctor
          opalspec update
