name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write   # required for npm trusted publishing (OIDC)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 24+ ships with npm 11.x natively (Node 22 LTS still bundles
          # npm 10.x, which does not support OIDC trusted publishing for the
          # registry PUT — only for the Sigstore provenance signature).
          node-version: '24.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Release consistency check
        run: node scripts/check-release-consistency.mjs

      - name: Pack tarball (dry run)
        run: npm pack --dry-run

      - name: Publish to npm
        # Pre-release tags (e.g. v3.4.0-rc.2) publish to the 'next' dist-tag
        # so `npm install @opalspec/opalspec` keeps resolving to the latest stable.
        # Stable tags publish to the default 'latest' dist-tag.
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "Pre-release tag detected; publishing to 'next' dist-tag"
            npm publish --access public --provenance --tag next
          else
            echo "Stable tag; publishing to 'latest' dist-tag"
            npm publish --access public --provenance
          fi
